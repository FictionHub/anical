name: Refresh SEO pages & events

# Regenerates the static SEO landing pages (/today/, /<season>-<year>/) +
# sitemap.xml from AniList, AND the Events page data (site/events.json, scraped
# from AnimeCons.com), then commits them. The commit triggers a normal Netlify
# STATIC deploy (no Netlify build command -> no build credits consumed). All the
# work runs here on GitHub Actions' own free minutes.

on:
  schedule:
    - cron: "30 8 * * *" # 08:30 UTC daily, after the social/discord posts
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate SEO pages
        run: node scripts/build-seo.mjs
      - name: Refresh events (scrape AnimeCons.com)
        run: node scripts/build-events.mjs
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          if git diff --cached --quiet; then
            echo "No changes — nothing to deploy."
          else
            git commit -m "chore: refresh SEO pages [skip ci]"
            git push
            echo "Committed refreshed pages; Netlify will deploy them."
          fi
